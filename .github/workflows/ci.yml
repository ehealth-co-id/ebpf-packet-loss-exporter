name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install BPF build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang llvm libelf-dev libbpf-dev linux-libc-dev
          sudo ln -sf /usr/include/$(uname -m)-linux-gnu/asm /usr/include/asm

      - name: Generate BPF objects
        run: make generate

      - name: Build
        run: make build

      - name: Test
        run: make test
