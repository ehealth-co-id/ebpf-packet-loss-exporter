name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install BPF build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang llvm libelf-dev libbpf-dev linux-libc-dev
          sudo ln -sf /usr/include/$(uname -m)-linux-gnu/asm /usr/include/asm

      - name: Build binaries
        run: |
          make generate
          for arch in amd64 arm64; do
            GOOS=linux GOARCH=$arch make cross
            mv ebpf_packet_loss_exporter ebpf_packet_loss_exporter-linux-$arch
          done

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ebpf_packet_loss_exporter-linux-amd64
            ebpf_packet_loss_exporter-linux-arm64
